name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 🔥 IMPORTANTE: Java 21 BIEN configurado
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      # 🔥 Verificación (para que no te vuelva loco)
      - name: Verificar Java
        run: java -version

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Capacitor
        run: npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # 🔥 FORZAR Gradle a usar Java 21
      - name: Forzar Java 21 en Gradle
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk