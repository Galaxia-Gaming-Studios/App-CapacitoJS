name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Instalar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Instalar dependencias npm
        run: npm install
      
      - name: Construir web app
        run: npm run build
      
      - name: Instalar Capacitor
        run: npm install @capacitor/cli @capacitor/core @capacitor/android
      
      - name: Sincronizar Capacitor
        run: npx cap sync
      
      - name: Forzar Java 17 en Gradle
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
      
      - name: Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace
      
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/